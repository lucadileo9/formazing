faqs:
  - question: "Se non sono sul gruppo dell'area e mi serve il messaggio da inoltrare ad altri gruppi o persone?"
    answer: "Nessun problema! Puoi tranquillamente copiare il testo del messaggio direttamente dalla schermata di preview dell'applicazione prima di dare la conferma definitiva di invio."
  - question: "Cosa succede se una formazione viene cancellata all'ultimo?"
    answer: "Basta semplicemente cambiare lo stato su Notion (es. rimetterlo in 'Programmata' o eliminare la riga). Al Formazing non cambia nulla, né interessa di ciò che succede su Notion finché non clicchi tu su un pulsante nell'app. Ma se era già calendarizzata, ricordati di avvisare i soci!"
  - question: "Cosa succede se modifico il codice a mano direttamente su Notion?"
    answer: "Rischi di creare errori, siccome nel foglio excel l'analisi delle formazioni si basa fortemente sul codice, un nome sbagliato, un trattino in più o in meno possono causare problemi. Se proprio necessario modifica il codice seguendo strettamente le istruzioni presenti nella sezione dedicata."
  - question: "Quali formazioni vengono mostrate nei messaggi del bot?"
    answer: "Il bot mostra SOLO le formazioni che si trovano nello stato 'Calendarizzata'. Se una formazione è ancora solo 'Programmata' o è già stata 'Conclusa', non apparirà nei messaggi per non creare confusione."
  - question: "Non vedo la formazione di stasera dopo aver fatto /oggi, come mai?"
    answer: "Potrebbe essere possibile che qualcuno abbia modificato lo stato della formazione, o il responsabile formazioni ha già usato Formazing per inviare il messaggio di feedback, questo avrebbe cambiato lo stato in 'Conclusa' e facendola sparire dai radar del bot. Controlla su Notion!"
  - question: "Posso usare l'applicazione dal mio smartphone?"
    answer: "Assolutamente sì! L'applicazione è totalmente responsive e funziona perfettamente da cellulare o tablet. Non cambia nulla rispetto alla versione desktop."
  - question: "E se cambio PC?"
    answer: "Formazing funziona online, basta avere il link, username, password e puoi gestire tutto da qualsiasi parte del mondo."
  - question: "Posso cambiare i nomi dei gruppi Telegram o le loro impostazioni?"
    answer: "Assolutamente no, come specificato nella regola d'oro N.1 Formazing riconosce i gruppi tramite il loro ID interno che è inserito nel codice. Se cambi i gruppi o ne crei di nuovi senza aggiornare Formazing, le notifiche smetteranno di funzionare."
  - question: "Quale indirizzo email viene utilizzato per inviare i messaggi?"
    answer: "Formazing usa l'account Microsoft ufficiale del Responsabile Formazioni."
  - question: "Quanto dura una formazione di default sul calendario?"
    answer: "Formazing imposta la durata di 1 ora per ogni evento creato. Non è possibile cambiarlo, e non ce n'è bisogno, se la formazione dura di più o di meno non cambia nulla."
  - question: "Posso modificare il template dei messaggi che vengono inviati?"
    answer: "No, i template sono fissi e non modificabili. Per cambiarli bisognerebbe intervenire sul codice di Formazing."
  - question: "Posso aggiungere un topic in uno dei gruppi Telegram?"
    answer: "No, non è possibile trasformare un gruppo Telegram normale in un gruppo con topic, bisognerebbe creare un nuovo gruppo, incasinando il tutto. Se il gruppo è già predisposto ai topic se ne può aggiungere uno, ma Formazing non è in grado di riconoscerlo e invierà comunque i messaggi al topic Generale."
  - question: "Per le formazioni dei soci in prova quali aree e periodi devo mettere su Notion?"
    answer: "Ipotizziamo una formazione per i soci in prova dell'area IT, del rec primaverile, bisognerà inserire 'IT in prova', volendo anche 'IT' se si vuole inviare la notifica anche al gruppo Telegram dell'area IT. Per il periodo invece, è necessario inserire 'SPRING'."
  - question: "Se una formazione è per più aree, come faccio?"
    answer: "Se una formazione è rivolta a più aree, è sufficiente inserire tutte le aree nel campo 'Area' su Notion, e tutti riceveranno la comunicazione. Unica nota: il codice conterrà solo la PRIMA area inserita, quindi conviene mettere come prima area quella 'principale'."
  - question: "Se una formazione è per tutti, cosa devo mettere su Notion?"
    answer: "Se una formazione è rivolta a tutti, è sufficiente inserire 'All' nel campo 'Area' su Notion, e tutti riceveranno la comunicazione. Senza dover specificare tutte le aree."
  - question: "Se una formazione è per soci in prova e soci normali, cosa devo mettere su Notion?"
    answer: "Se una formazione è rivolta sia a soci in prova che a soci normali, è sufficiente inserire sia 'All' che 'In prova' nel campo 'Area' su Notion, e tutti riceveranno la comunicazione."
  - question: "Se una formazione è rivolta all'esterno dell'associazione, cosa devo mettere su Notion?"
    answer: "Se una formazione è rivolta all'esterno dell'associazione (ovvero che NOI eroghiamo ad altre JE), come area basta inserire l'area interessata, e come periodo si deve mettere 'OUT'. Una volta schedulata si può inviare la comunicazione a chi di interesse."
  - question: "Se la formazione la riceviamo da altre associazioni o enti esterni, come devo comportarmi?"
    answer: "In questo caso NOI RICEVIAMO la formazione dall'esterno per sviluppare competenze, quindi inserisci come periodo 'EXT'. Se l'ente esterno non fornisce il link, puoi usare Formazing per crearlo e girarlo all'ente. Se l'ente esterno fornisce il suo link, usa normalmente Formazing per inviare le comunicazioni e poi inserisci A MANO il link dell'ente su Notion al posto di quello Teams generato dall'app. Così facendo, usando i comandi del bot, il link corretto sarà visibile a tutti."
  - question: "Se qualcuno eroga una formazione, non nel periodo di prova, che periodo inserisco?"
    answer: "Non trattandosi di una formazione per soci in prova, legata al rec primaverile o autunnale, è sufficiente inserire 'ONCE' come periodo."
  - question: "Cosa succede se mi accorgo di aver sbagliato la data o l'ora DOPO aver cliccato 'Conferma e Invia' e calendarizzato la formazione?"
    answer: "Formazing non aggiorna automaticamente eventi o messaggi già inviati. Dovrai correggere la data su Notion, modificare a mano l'evento su Teams e avvisare i soci del cambiamento sul gruppo Telegram."
  - question: "Come faccio a inviare il link di feedback se la formazione non era stata gestita e calendarizzata tramite Formazing?"
    answer: "Formazing mostra nella schermata di chiusura solo le formazioni con stato 'Calendarizzata'. Se hai gestito una formazione a mano, dovrai inviare tu il link del feedback sul gruppo, oppure impostarla su 'Calendarizzata' in Notion per farla comparire su Formazing."