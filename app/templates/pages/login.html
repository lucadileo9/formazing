{% extends "layout/base.html" %}

{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center bg-blu-jemore my-4">
    <div class="row justify-content-center w-100">
        <div class="col-md-5 col-lg-4">
            <div class="card-jemore shadow-lg-jemore border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center text-blu-jemore mb-4">
                        <!-- JEMORE LOGO -->
                        <img src="{{ url_for('static', filename='images/logo_jemore.png') }}" alt="JEMORE" class="img-fluid mb-4" style="max-height: 80px;">

                        <h1 class="h4 fw-bold">{{ app_name|default('Formazing') }}</h1>
                        <p class="small">Gestione Formazioni Aziendali</p>
                    </div>

                    <div class="alert bg-light text-blu-jemore border-0 mb-4 py-3 px-3 small shadow-sm text-center">
                        <i class="bi bi-shield-lock-fill me-2"></i>
                        Utilizza il tuo account <strong>JEMORE</strong> per accedere alla piattaforma.
                    </div>
                    <div class="text-center">
                        <a href="{{ url_for('main.login') }}" class="btn btn-jemore-blu w-100 py-2 shadow-sm d-flex align-items-center justify-content-center">
                            <i class="bi bi-microsoft me-2 fs-5"></i> 
                            <span>Accedi con Microsoft</span>
                        </a>
                    </div>
                    <div class="mt-4 text-center">
                        <p class="extra-small text-muted mb-0">L'accesso è riservato ai soci e al board di JEMORE.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
