<!-- ⚛️ ATOM: Badge universale -->
{% set is_jemore = color and color.startswith('badge-') %}
<span class="{{ 'badge-jemore' if is_jemore else 'badge' }} {{ color|default('bg-secondary') }} {{ size|default('') }}">
    {% if icon %}<i class="{{ icon }} me-1"></i>{% endif %}
    {{ text|default('Badge') }}
</span>
